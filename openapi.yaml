    description: Authentication
  - name: Category
    description: Device categories
paths:
  /api/login:
    post:
      tags:
        - Account
      summary: Login
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /api/logout:
    post:
      tags:
        - Account
      summary: Logout
      operationId: logout
      security:
        - bearerAuth: []
      responses:
        '204':
          description: No Content

  /api/category:
    get:
      tags:
        - Category
      summary: List categories
      operationId: listCategories
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
