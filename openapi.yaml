components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: admin
        password:
          type: string
          example: '0000'
    LoginResponse:
      type: object
      required:
        - message
        - token
      properties:
        message:
          type: string
        token:
          type: string
    MessageResponse:
      type: object
      properties:
        message:
          type: string
    Category:
      type: object
      properties:
        id:
          type: integer
          example: 4
        name:
          type: string
          example: server
        idle_device:
          type: integer
          example: 0
        using_device:
          type: integer
          example: 0
    CategoryListResponse:
      type: object
      properties:
        categories:
          type: array
          items:
            $ref: '#/components/schemas/Category'
    CategoryCreateRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: server
    DeviceShort:
      type: object
      properties:
        id:
          type: integer
          example: 3
        name:
          type: string
          example: 16plus
        status:
          type: string
          example: idle
        user:
          type: string
          example: ''
    DeviceListResponse:
      type: object
      properties:
        Devices:
          type: array
          items:
            $ref: '#/components/schemas/DeviceShort'
    Device:
      type: object
      properties:
        id:
          type: integer
          example: 3
        category:
          type: string
          example: iphone
        name:
          type: string
          example: 16plus
        status:
          type: string
          example: idle
        user:
          type: string
          example: ''
        owner:
          type: string
          example: alonza
        note:
          type: string
          example: good iphone
    DeviceCreateRequest:
      type: object
      required:
        - category
        - name
      properties:
        category:
          type: string
          example: iphone
        name:
          type: string
          example: 16plus
        owner:
          type: string
          example: alonza
        note:
          type: string
          example: good iphone
    DeviceUserRequest:
      type: object
      required:
        - user
      properties:
        user:
          type: string
          example: alonza