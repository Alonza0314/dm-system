      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: admin
        password:
          type: string
          example: '0000'
    LoginResponse:
      type: object
      required:
        - message
        - token
      properties:
        message:
          type: string
        token:
          type: string
    MessageResponse:
      type: object
      properties:
        message:
          type: string
    Category:
      type: object
      properties:
        id:
          type: integer
          example: 4
        name:
          type: string
          example: server
        idle_device:
          type: integer
          example: 0
        using_device:
          type: integer
          example: 0
    CategoryListResponse:
      type: object
      properties:
        categories:
          type: array
          items:
            $ref: '#/components/schemas/Category'
    CategoryCreateRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: server