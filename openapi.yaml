  /api/category/{name}:
    get:
      tags:
        - Category
      summary: Get category
      operationId: getCategory
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: path
          required: true
          description: Category name
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '401':
          description: Unauthorized
          content:
            application/json:
