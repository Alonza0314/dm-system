name: Docker

on:
  schedule:
    - cron: '14 19 * * *'  # UTC 19:14 (Local 03:14)
  push:
    tags: ['v*.*.*']
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  IMAGE_NAME: alonza0314/dm-system

jobs:
  build:
    name: Build Check & IT
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/')) || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: [ '1.26.2' ]
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: ./docker/build.sh test

      - name: Test Docker image
        run: |
          docker images
          docker run --rm ${{ env.IMAGE_NAME }}:test ls /dm/dm
          docker run --rm ${{ env.IMAGE_NAME }}:test ls /dm/frontend

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: IT
        run: |
          cd integration-test
          ./test.sh -t TestApiAccount
          ./test.sh -t TestApiCategory
          ./test.sh -t TestApiDevice
          ./test.sh -t TestApiQrcode
          ./test.sh -t TestApiSetting

  version-release:
    name: Release Version Image
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.ref_name }}

  latest-release:
    name: Release Latest Image
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
